<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akshat Chowdhary — AI Interview Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #111008;
      --bg2:     #1A1810;
      --bg3:     #211F14;
      --yellow:  #E8C84A;
      --yellow2: #F5D96A;
      --text:    #EDE8D8;
      --muted:   #8A8470;
      --border:  #2A2820;
      --border2: #3A3828;
      --success: #5DBE8A;
      --display: 'Bebas Neue', sans-serif;
      --mono:    'DM Mono', monospace;
      --sans:    'Inter', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--yellow);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--display);
      font-size: 15px;
      color: var(--bg);
      flex-shrink: 0;
    }
    .header-name {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 500;
    }
    .header-divider { width: 1px; height: 16px; background: var(--border2); }
    .status-dot {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .status-dot::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .phone-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      border: 1px solid var(--border2);
      padding: 4px 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .phone-tag span { color: var(--yellow); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 8px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
      position: relative;
      z-index: 2;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); }

    /* ── Empty state with canvas ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      gap: 0;
      position: relative;
    }
    .empty-text-col {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
      z-index: 2;
    }
    .empty-index {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--yellow);
      opacity: 0.6;
      margin-bottom: 14px;
    }
    .empty-display {
      font-family: var(--display);
      font-size: clamp(48px, 6.5vw, 82px);
      letter-spacing: 0.03em;
      line-height: 0.92;
      color: var(--text);
      margin-bottom: 22px;
    }
    .empty-display em { color: var(--yellow); font-style: normal; }
    .empty-sub {
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .empty-line {
      width: 36px; height: 1px;
      background: var(--yellow);
      opacity: 0.4;
      margin-bottom: 28px;
    }
    .empty-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .empty-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border2);
      padding: 4px 10px;
    }

    /* ── 3D Canvas ── */
    .canvas-col {
      width: 340px;
      height: 340px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #hero-canvas {
      width: 100%;
      height: 100%;
    }

    /* ── Messages ── */
    .msg {
      display: flex; flex-direction: column; gap: 5px;
      max-width: 680px;
      animation: slideUp 0.18s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }
    .msg-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .msg.user .msg-label { color: var(--yellow); opacity: 0.7; }
    .bubble {
      padding: 12px 16px;
      font-size: 13.5px;
      line-height: 1.7;
      font-weight: 300;
    }
    .msg.user .bubble {
      background: var(--yellow);
      color: var(--bg);
      font-weight: 400;
      clip-path: polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%);
    }
    .msg.bot .bubble {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-left: 2px solid var(--yellow);
      color: var(--text);
    }
    .bubble strong { font-weight: 500; color: var(--yellow2); }
    .bubble code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg2);
      padding: 1px 5px;
      color: var(--yellow2);
    }
    .typing-wrap { display:flex;align-items:center;gap:6px;padding:14px 16px; }
    .typing-wrap span {
      width:5px;height:5px;border-radius:50%;
      background:var(--yellow);opacity:.4;
      animation:blink 1.4s infinite;
    }
    .typing-wrap span:nth-child(2){animation-delay:.2s}
    .typing-wrap span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

    /* ── Quick prompts ── */
    .quick-prompts {
      display: flex; flex-wrap: wrap; gap: 7px;
      padding: 0 28px 14px;
      position: relative; z-index: 2;
    }
    .qp-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .qp-btn:hover { border-color:var(--yellow);color:var(--yellow);background:rgba(232,200,74,.05); }

    /* ── Input ── */
    .input-area {
      padding: 14px 28px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      position: relative; z-index: 10;
    }
    .input-row { display:flex;gap:10px;align-items:flex-end; }
    .input-wrap {
      flex: 1;
      border: 1px solid var(--border2);
      background: var(--bg2);
      display: flex; align-items: flex-end;
      transition: border-color 0.15s;
      position: relative;
    }
    .input-wrap:focus-within { border-color: var(--yellow); }
    .input-corner {
      position:absolute;bottom:-1px;right:-1px;
      width:8px;height:8px;
      border-right:1px solid var(--yellow);
      border-bottom:1px solid var(--yellow);
    }
    textarea {
      flex:1;background:transparent;border:none;
      color:var(--text);font-family:var(--sans);
      font-size:13.5px;font-weight:300;
      padding:11px 14px;resize:none;
      min-height:42px;max-height:130px;outline:none;line-height:1.6;
    }
    textarea::placeholder{color:var(--muted);font-size:12px;letter-spacing:.04em}
    #send-btn {
      width:42px;height:42px;
      background:var(--yellow);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:opacity .15s,transform .1s;
      clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%);
    }
    #send-btn:hover{opacity:.85}
    #send-btn:active{transform:scale(.95)}
    #send-btn:disabled{opacity:.3;cursor:not-allowed}
    #send-btn svg{fill:var(--bg)}
    .input-hint {
      margin-top:7px;font-family:var(--mono);
      font-size:9px;letter-spacing:.1em;
      text-transform:uppercase;color:var(--muted);opacity:.5;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">AC</div>
    <div class="header-name" id="persona-name">Akshat Chowdhary</div>
    <div class="header-divider"></div>
    <div class="status-dot">Live · RAG grounded</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="phone-tag" id="phone-badge" style="display:none">
      ☏ &nbsp;<span id="phone-display"></span>
    </div>
  </div>
</header>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="empty-text-col">
      <div class="empty-index">01 / AI INTERVIEW ASSISTANT</div>
      <div class="empty-display">ASK ME<br>ANYTHING<br>ABOUT <em>AKSHAT</em></div>
      <div class="empty-sub">RAG-grounded · Live calendar · Voice enabled</div>
      <div class="empty-line"></div>
      <div class="empty-tags">
        <span class="empty-tag">LangChain</span>
        <span class="empty-tag">FastAPI</span>
        <span class="empty-tag">Voice AI</span>
        <span class="empty-tag">RAG</span>
        <span class="empty-tag">LLM Evals</span>
      </div>
    </div>
    <div class="canvas-col">
      <canvas id="hero-canvas"></canvas>
    </div>
  </div>
</div>

<div class="quick-prompts" id="quick-prompts">
  <button class="qp-btn" onclick="sendQuick('Why should we hire you for this role?')">Why hire?</button>
  <button class="qp-btn" onclick="sendQuick('Walk me through the ELIRA project.')">ELIRA</button>
  <button class="qp-btn" onclick="sendQuick('What are your top technical skills?')">Tech skills</button>
  <button class="qp-btn" onclick="sendQuick('Check availability for a 30-min call this week.')">Book a call</button>
  <button class="qp-btn" onclick="sendQuick('Tell me about your internship at Zeepty.')">Zeepty internship</button>
  <button class="qp-btn" onclick="sendQuick('What is the ASTRA voice AI project?')">ASTRA</button>
</div>

<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Ask about projects, skills, availability…" rows="1"></textarea>
      <div class="input-corner"></div>
    </div>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
const API_BASE  = window.location.origin;
const CAND_NAME = "Akshat Chowdhary";
const PHONE_NUM = "+1 (239) 663 4085";

let sessionId = null;
let isWaiting = false;

// ── 3D Wireframe Icosahedron ──────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('hero-canvas');
  const ctx    = canvas.getContext('2d');
  const W = 340, H = 340;
  canvas.width  = W;
  canvas.height = H;

  const YELLOW  = '#E8C84A';
  const YELLOW2 = 'rgba(232,200,74,0.18)';
  const DIM     = 'rgba(232,200,74,0.06)';

  // Icosahedron vertices
  const phi = (1 + Math.sqrt(5)) / 2;
  const vRaw = [
    [-1, phi,0],[1,phi,0],[-1,-phi,0],[1,-phi,0],
    [0,-1,phi],[0,1,phi],[0,-1,-phi],[0,1,-phi],
    [phi,0,-1],[phi,0,1],[-phi,0,-1],[-phi,0,1]
  ];
  // Normalize
  const vertices = vRaw.map(v => {
    const len = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
    return [v[0]/len, v[1]/len, v[2]/len];
  });

  const faces = [
    [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
    [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
    [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
    [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]
  ];

  // Build unique edges
  const edgeSet = new Set();
  const edges = [];
  faces.forEach(f => {
    [[f[0],f[1]],[f[1],f[2]],[f[2],f[0]]].forEach(([a,b]) => {
      const key = Math.min(a,b)+'-'+Math.max(a,b);
      if (!edgeSet.has(key)) { edgeSet.add(key); edges.push([a,b]); }
    });
  });

  let rx = 0, ry = 0, rz = 0;
  let vx = 0.003, vy = 0.007, vz = 0.002;
  const R = 120; // radius

  function rotX(v, a) {
    return [v[0], v[1]*Math.cos(a)-v[2]*Math.sin(a), v[1]*Math.sin(a)+v[2]*Math.cos(a)];
  }
  function rotY(v, a) {
    return [v[0]*Math.cos(a)+v[2]*Math.sin(a), v[1], -v[0]*Math.sin(a)+v[2]*Math.cos(a)];
  }
  function rotZ(v, a) {
    return [v[0]*Math.cos(a)-v[1]*Math.sin(a), v[0]*Math.sin(a)+v[1]*Math.cos(a), v[2]];
  }
  function project(v) {
    const fov = 4;
    const z = v[2] + fov;
    return [W/2 + v[0]*R*fov/z, H/2 + v[1]*R*fov/z, v[2]];
  }

  // Outer orbit dots
  const orbitDots = Array.from({length: 8}, (_, i) => ({
    angle: (i / 8) * Math.PI * 2,
    radius: 148 + Math.sin(i*1.3)*8,
    speed: 0.004 + i*0.0003,
    size: 1.5 + (i%3)*0.5,
  }));

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Outer glow ring
    ctx.beginPath();
    ctx.arc(W/2, H/2, 148, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(232,200,74,0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(W/2, H/2, 138, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(232,200,74,0.04)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Orbit dots
    orbitDots.forEach(d => {
      const x = W/2 + Math.cos(d.angle) * d.radius;
      const y = H/2 + Math.sin(d.angle) * d.radius;
      ctx.beginPath();
      ctx.arc(x, y, d.size, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(232,200,74,0.5)';
      ctx.fill();
      d.angle += d.speed;
    });

    // Rotate all vertices
    const rotated = vertices.map(v => {
      let r = rotX(v, rx);
      r = rotY(r, ry);
      r = rotZ(r, rz);
      return r;
    });

    const projected = rotated.map(project);

    // Draw faces (filled, very dim)
    faces.forEach(f => {
      const [a, b, c] = f.map(i => projected[i]);
      // Backface cull — compute normal z
      const nx = (b[0]-a[0])*(c[1]-a[1]) - (b[1]-a[1])*(c[0]-a[0]);
      ctx.beginPath();
      ctx.moveTo(a[0], a[1]);
      ctx.lineTo(b[0], b[1]);
      ctx.lineTo(c[0], c[1]);
      ctx.closePath();
      ctx.fillStyle = nx > 0 ? 'rgba(232,200,74,0.04)' : 'rgba(232,200,74,0.01)';
      ctx.fill();
    });

    // Draw edges
    edges.forEach(([i, j]) => {
      const a = projected[i], b = projected[j];
      const avgZ = (rotated[i][2] + rotated[j][2]) / 2;
      const alpha = 0.15 + (avgZ + 1) * 0.3;
      ctx.beginPath();
      ctx.moveTo(a[0], a[1]);
      ctx.lineTo(b[0], b[1]);
      ctx.strokeStyle = `rgba(232,200,74,${Math.min(alpha, 0.75)})`;
      ctx.lineWidth = avgZ > 0.3 ? 1.2 : 0.6;
      ctx.stroke();
    });

    // Draw vertices
    projected.forEach((p, i) => {
      const z = rotated[i][2];
      const size = z > 0.3 ? 2.5 : 1.5;
      const alpha = 0.3 + (z + 1) * 0.35;
      ctx.beginPath();
      ctx.arc(p[0], p[1], size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(232,200,74,${Math.min(alpha, 1)})`;
      ctx.fill();
    });

    // Slight drift in rotation speed
    vx += (Math.random()-0.5)*0.00005;
    vy += (Math.random()-0.5)*0.00005;
    vz += (Math.random()-0.5)*0.00003;
    vx = Math.max(-0.008, Math.min(0.008, vx));
    vy = Math.max(-0.012, Math.min(0.012, vy));
    vz = Math.max(-0.005, Math.min(0.005, vz));

    rx += vx; ry += vy; rz += vz;
    requestAnimationFrame(draw);
  }

  draw();
})();

// ── Chat logic ────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("persona-name").textContent = CAND_NAME;
  if (PHONE_NUM) {
    document.getElementById("phone-display").textContent = PHONE_NUM;
    document.getElementById("phone-badge").style.display = "flex";
  }
  const ta = document.getElementById("user-input");
  ta.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  ta.addEventListener("input", () => {
    ta.style.height = "auto";
    ta.style.height = Math.min(ta.scrollHeight, 130) + "px";
  });
});

function renderMarkdown(text) {
  return text
    .replace(/```[\s\S]*?```/g, m => `<pre style="background:var(--bg2);border:1px solid var(--border2);padding:10px;margin:8px 0;font-family:var(--mono);font-size:12px;overflow-x:auto">${m.replace(/```\w*\n?/g,'')}</pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.+)$/gm,'<div style="font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--yellow);margin:12px 0 4px">$1</div>')
    .replace(/^- (.+)$/gm,'<div style="padding-left:12px;margin:2px 0">· $1</div>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

function appendMessage(role, content) {
  document.getElementById("empty-state")?.remove();
  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.className = `msg ${role}`;
  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "user" ? "You" : CAND_NAME + " · AI";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = role === "bot" ? renderMarkdown(content) : escHtml(content);
  div.appendChild(label);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showTyping() {
  document.getElementById("empty-state")?.remove();
  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.id = "typing-indicator";
  div.className = "msg bot";
  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = CAND_NAME + " · AI";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = '<div class="typing-wrap"><span></span><span></span><span></span></div>';
  div.appendChild(label);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { document.getElementById("typing-indicator")?.remove(); }

async function sendMessage() {
  const ta  = document.getElementById("user-input");
  const msg = ta.value.trim();
  if (!msg || isWaiting) return;
  ta.value = ""; ta.style.height = "auto";
  isWaiting = true;
  document.getElementById("send-btn").disabled = true;
  appendMessage("user", msg);
  showTyping();
  try {
    const resp = await fetch(`${API_BASE}/chat/message`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, session_id: sessionId, stream: false }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    sessionId  = data.session_id;
    hideTyping();
    appendMessage("bot", data.answer);
  } catch (err) {
    hideTyping();
    appendMessage("bot", "Connection error — is the server running?");
  } finally {
    isWaiting = false;
    document.getElementById("send-btn").disabled = false;
    document.getElementById("user-input").focus();
  }
}

function sendQuick(text) {
  document.getElementById("user-input").value = text;
  sendMessage();
}
</script>
</body>
</html>
