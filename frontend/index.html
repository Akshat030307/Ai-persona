<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Persona — Interview Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0C0F1A;
      --surface:   #131729;
      --surface2:  #1A1F35;
      --border:    #252B45;
      --accent:    #4F7EFF;
      --accent2:   #7C3AED;
      --text:      #E2E8F0;
      --muted:     #64748B;
      --success:   #10B981;
      --mono:      'DM Mono', monospace;
      --sans:      'Syne', sans-serif;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
    }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--success);
    }

    .status-pill::before {
      content: '';
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .phone-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }

    .phone-badge span { color: var(--text); font-weight: 500; }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      max-width: 100%;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius) var(--radius) 2px var(--radius);
    }

    .msg.bot .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) var(--radius) 2px;
    }

    .bubble code {
      font-family: var(--mono);
      background: rgba(79,126,255,0.12);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .bubble pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-top: 8px;
      overflow-x: auto;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex; gap: 4px; align-items: center;
      padding: 14px 16px;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* ── Quick prompts ── */
    .quick-prompts {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 24px 16px;
    }

    .qp-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .qp-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    #send-btn:hover  { opacity: 0.9; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { fill: #fff; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    .empty-state .big-icon {
      font-size: 48px;
      opacity: 0.4;
    }

    .empty-state h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-state p {
      font-size: 13px;
      max-width: 360px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="avatar" id="avatar-initials">AI</div>
  <div class="header-info">
    <h1 id="persona-name">AI Interview Assistant</h1>
    <div class="status-pill">Live · RAG-grounded</div>
  </div>
  <div class="phone-badge" id="phone-badge" style="display:none">
    📞 <span id="phone-display"></span>
  </div>
</header>

<!-- ── Messages ── -->
<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="big-icon">🤖</div>
    <h2>Ask me anything about the candidate</h2>
    <p>I'm grounded on their resume and GitHub repos. Ask about projects, skills, experience — or schedule an interview.</p>
  </div>
</div>

<!-- ── Quick prompts ── -->
<div class="quick-prompts" id="quick-prompts">
  <button class="qp-btn" onclick="sendQuick('Why should we hire you for this role?')">Why hire?</button>
  <button class="qp-btn" onclick="sendQuick('Walk me through your most impactful GitHub project.')">Key project</button>
  <button class="qp-btn" onclick="sendQuick('What are your top technical skills?')">Tech skills</button>
  <button class="qp-btn" onclick="sendQuick('Check your availability this week for a 30-min call.')">Book a call</button>
  <button class="qp-btn" onclick="sendQuick('Tell me about your work experience.')">Experience</button>
</div>

<!-- ── Input ── -->
<div class="input-area">
  <div class="input-row">
    <textarea
      id="user-input"
      placeholder="Ask about projects, skills, availability…"
      rows="1"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ── Config — update these after deployment ──────────────────────────────────
  const API_BASE    = window.location.origin;  // same-origin in prod
  const CAND_NAME   = "Your Name";             // REPLACE with candidate name
  const PHONE_NUM   = "+1 (555) 000-0000";     // REPLACE with Vapi phone number

  // ── State ───────────────────────────────────────────────────────────────────
  let sessionId = null;
  let isWaiting = false;

  // ── Init ────────────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("persona-name").textContent = `${CAND_NAME} · AI Assistant`;
    document.getElementById("avatar-initials").textContent =
      CAND_NAME.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);

    if (PHONE_NUM) {
      document.getElementById("phone-display").textContent = PHONE_NUM;
      document.getElementById("phone-badge").style.display = "flex";
    }

    const ta = document.getElementById("user-input");
    ta.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    ta.addEventListener("input", () => {
      ta.style.height = "auto";
      ta.style.height = Math.min(ta.scrollHeight, 140) + "px";
    });
  });

  // ── Markdown (minimal) ──────────────────────────────────────────────────────
  function renderMarkdown(text) {
    return text
      .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<strong style="font-size:13px;color:var(--accent)">$1</strong>')
      .replace(/^## (.+)$/gm, '<strong style="font-size:14px;color:var(--accent)">$1</strong>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n/g, '<br>');
  }

  // ── Append message ──────────────────────────────────────────────────────────
  function appendMessage(role, content) {
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();

    const msgs = document.getElementById("messages");
    const div  = document.createElement("div");
    div.className = `msg ${role}`;

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = role === "user" ? "You" : CAND_NAME + " · AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML  = role === "bot" ? renderMarkdown(content) : escapeHtml(content);

    div.appendChild(label);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── Typing indicator ────────────────────────────────────────────────────────
  function showTyping() {
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();

    const msgs = document.getElementById("messages");
    const div  = document.createElement("div");
    div.id = "typing-indicator";
    div.className = "msg bot";

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = CAND_NAME + " · AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML  = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    div.appendChild(label);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    document.getElementById("typing-indicator")?.remove();
  }

  // ── Send message ────────────────────────────────────────────────────────────
  async function sendMessage() {
    const ta  = document.getElementById("user-input");
    const msg = ta.value.trim();
    if (!msg || isWaiting) return;

    ta.value = "";
    ta.style.height = "auto";

    isWaiting = true;
    document.getElementById("send-btn").disabled = true;

    appendMessage("user", msg);
    showTyping();

    try {
      const resp = await fetch(`${API_BASE}/chat/message`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message:    msg,
          session_id: sessionId,
          stream:     false,
        }),
      });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const data = await resp.json();
      sessionId  = data.session_id;

      hideTyping();
      appendMessage("bot", data.answer);

    } catch (err) {
      hideTyping();
      appendMessage("bot", "⚠️ Connection error. Is the server running? Check the API_BASE config.");
      console.error(err);
    } finally {
      isWaiting = false;
      document.getElementById("send-btn").disabled = false;
      ta.focus();
    }
  }

  function sendQuick(text) {
    const ta = document.getElementById("user-input");
    ta.value = text;
    sendMessage();
  }
</script>
</body>
</html>
